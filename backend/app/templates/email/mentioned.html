{% extends "base.html" %}
{% block title %}You Were Mentioned{% endblock %}
{% block content %}
<h2>You Were Mentioned</h2>
<p><strong>{{ actor_name }}</strong> mentioned you in <strong>{{ title }}</strong>.</p>
{% if body %}
<blockquote style="border-left: 3px solid #c7d2fe; padding: 8px 16px; margin: 16px 0; color: #4b5563; background: #f9fafb; border-radius: 4px;">
  {{ body[:300] }}{% if body|length > 300 %}…{% endif %}
</blockquote>
{% endif %}
<p style="margin-top: 20px;"><a class="btn" href="{{ app_base_url }}/tickets/{{ ticket_id }}">View Ticket</a></p>
{% endblock %}
